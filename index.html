<!DOCTYPE html>
<html>
<head>
<style>
  .container {
    font-family: 'Arial', sans-serif;
    text-align: center;
    background-color: #f9f9f9;
    padding: 30px;
    border-radius: 15px;
    border: 2px solid #d4af37;
    max-width: 400px;
    margin: auto;
  }
  .title {
    color: #d4af37;
    font-size: 24px;
    font-weight: bold;
  }
  .message {
    color: #333;
    font-size: 18px;
    margin: 20px 0;
  }
  .name {
    color: #2c3e50;
    font-weight: bold;
    font-size: 20px;
  }
  .footer {
    color: #777;
    font-size: 14px;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="title">অগ্রিম ঈদ মোবারক!</div>
  <p class="message">প্রিয় বন্ধু <span class="name">আনাবিয়া ইসলাম</span>,</p>
  <p class="message">আসন্ন পবিত্র ঈদুল আজহার অনেক অনেক শুভেচ্ছা ও ভালোবাসা রইল। আপনার জীবন আনন্দ ও খুশিতে ভরে উঠুক।</p>
  <div class="footer">আঃ আলীম আপনাকে জানাচ্ছে আগ্রিম ♥️ঈদ মোবারক♥️!</div>
</div>

</body>
</html>
