<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অগ্রিম ঈদ মোবারক - প্রিয় বন্ধু আনাবিয়া ইসলাম</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f021a, #05000a);
            color: #fff;
            font-family: 'SolaimanLipi', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
            user-select: none;
        }

        /* মেইন কার্ড ডিজাইন */
        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(212, 175, 55, 0.7);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 30px rgba(212, 175, 55, 0.25);
            max-width: 420px;
            width: 85%;
            z-index: 10;
            animation: cardFadeIn 1.5s ease-out;
            position: relative;
        }

        h1 {
            color: #d4af37;
            font-size: 36px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
            letter-spacing: 1px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #f1f2f6;
            margin: 10px 0;
        }

        .name {
            color: #ff4757;
            font-size: 30px;
            font-weight: bold;
            display: block;
            margin: 15px 0;
            text-shadow: 0 0 12px rgba(255, 71, 87, 0.7);
        }

        /* ইনলাইন SVG গরুর অ্যানিমেশন */
        .cow-container {
            margin: 20px 0;
        }
        .cow-svg {
            width: 95px;
            height: 95px;
            animation: cowBounce 1.5s infinite ease-in-out;
        }

        .advance {
            font-size: 24px;
            color: #2ed573;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 0 0 10px rgba(46, 213, 115, 0.7);
            animation: pulse 1.5s infinite alternate;
        }

        /* বাজি ও লাভ রিয়্যাক্ট কণা (Particles) */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: explode 0.9s ease-out forwards;
            box-shadow: 0 0 8px currentColor;
        }

        .heart {
            position: absolute;
            color: #ff4757;
            font-size: 24px;
            pointer-events: none;
            animation: heartFall 3.5s linear infinite;
            z-index: 1;
            text-shadow: 0 0 5px rgba(255, 71, 87, 0.5);
        }

        /* অ্যানিমেশন ইফেক্টস */
        @keyframes cardFadeIn {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes cowBounce {
            0%, 100% { transform: translateY(0) scaleY(1); }
            50% { transform: translateY(-20px) scaleY(1.03); }
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        @keyframes heartFall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 1; }
            50% { transform: translateY(50vh) translateX(20px) rotate(180deg); }
            100% { transform: translateY(100vh) translateX(-20px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>অগ্রিম ঈদ মোবারক!</h1>
        <p>প্রিয় বন্ধু,</p>
        <span class="name">❤️আনাবিয়া ইসলাম❤️</span>
        <p>আসন্ন পবিত্র ঈদুল আজহার অনেক অনেক শুভেচ্ছা ও ভালোবাসা রইল। ত্যাগের মহিমায় উদ্ভাসিত হোক আপনার প্রতিটি মুহূর্ত।</p>
        
        <!-- ইনলাইন SVG কিউট কাউ (ছবি লোড না হওয়ার কোনো ভয় নেই) -->
        <div class="cow-container">
            <svg class="cow-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="36" r="22" fill="#E2E8F0"/>
                <path d="M18 24c-3 0-6 2-6 6s3 5 6 3V24zM46 24c3 0 6 2 6 6s-3 5-6 3V24z" fill="#CBD5E1"/>
                <ellipse cx="23" cy="22" rx="7" ry="12" fill="#475569" transform="rotate(-30 23 22)"/>
                <ellipse cx="41" cy="22" rx="7" ry="12" fill="#475569" transform="rotate(30 41 22)"/>
                <circle cx="24" cy="34" r="3" fill="#0f172a"/>
                <circle cx="40" cy="34" r="3" fill="#0f172a"/>
                <ellipse cx="32" cy="46" rx="14" ry="9" fill="#FDA4AF"/>
                <circle cx="27" cy="45" r="1.5" fill="#E11D48"/>
                <circle cx="37" cy="45" r="1.5" fill="#E11D48"/>
                <path d="M16 42c0-5 3-7 5-5s0 8-5 5z" fill="#475569"/>
                <path d="M38 22c0-3 2-5 4-2s-1 6-4 2z" fill="#475569"/>
            </svg>
        </div>

        <div class="advance">✨ আঃ আলীম আপনাকে জানাচ্ছে ঈদের অগ্রীম শুভেচ্ছা ❤️ঈদ মোবারক❤️ ✨</div>
    </div>

    <script>
        // অটোমেটিক অনবরত বাজি ফোটার ফাংশন
        function triggerAutoFirework() {
            // স্ক্রিনের র্যান্ডম পজিশন (ডানে-বামে এবং ওপরের অর্ধেক অংশে)
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * (window.innerHeight * 0.65);
            
            // এক একটি বাজিতে ২৫টি রঙিন কণা বা স্পার্ক তৈরি হবে
            for (let i = 0; i < 25; i++) {
                createFireworkParticle(x, y);
            }
        }
        // প্রতি ১ সেকেন্ড পরপর নিজে নিজেই বাজি ফুটবে
        setInterval(triggerAutoFirework, 1000);

        // ইউজার স্ক্রিনে টাচ বা ক্লিক করলেও সেখানে বাজি ফুটবে
        window.addEventListener('click', (e) => {
            for (let i = 0; i < 20; i++) {
                createFireworkParticle(e.clientX, e.clientY);
            }
        });

        function createFireworkParticle(x, y) {
            const p = document.createElement('div');
            p.classList.add('particle');
            
            // গর্জিয়াস ব্রাইট কালার প্যালেট
            const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa500', '#d4af37', '#ff6b81', '#00ffff', '#e056fd'];
            const chosenColor = colors[Math.floor(Math.random() * colors.length)];
            p.style.backgroundColor = chosenColor;
            p.style.color = chosenColor;
            
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            
            // র্যান্ডম সাইজ
            const size = Math.random() * 6 + 4;
            p.style.width = size + 'px';
            p.style.height = size + 'px';

            // চারদিকে ছড়িয়ে যাওয়ার গতি ও কোণ (Angle)
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 150 + 70; 
            p.style.setProperty('--x', Math.cos(angle) * velocity + 'px');
            p.style.setProperty('--y', Math.sin(angle) * velocity + 'px');

            document.body.appendChild(p);
            setTimeout(() => { p.remove(); }, 900);
        }

        // লাভ রিঅ্যাক্ট (হার্ট ফলিং) ফাংশন
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's'; // ৩ থেকে ৫ সেকেন্ডের মধ্যে পড়বে
            heart.style.fontSize = Math.random() * 15 + 15 + 'px'; // সাইজ ছোট-বড় হবে
            document.body.appendChild(heart);

            setTimeout(() => { heart.remove(); }, 4000);
        }
        // প্রতি ৪০০ মিলি-সেকেন্ড পরপর একটি করে হার্ট পড়বে
        setInterval(createHeart, 400);
    </script>
</body>
</html>
