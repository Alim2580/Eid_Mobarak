<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অগ্রিম ঈদ মোবারক - আনাবিয়া ইসলাম</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a052e, #0b0114);
            color: #fff;
            font-family: 'SolaimanLipi', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
            user-select: none;
        }

        /* কার্ড ডিজাইন */
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(212, 175, 55, 0.6);
            padding: 35px 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 25px rgba(212, 175, 55, 0.3);
            max-width: 420px;
            width: 85%;
            z-index: 10;
            animation: fadeIn 1.5s ease-out;
            position: relative;
        }

        h1 {
            color: #d4af37;
            font-size: 32px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.7);
        }

        .name {
            color: #ff4757;
            font-size: 28px;
            font-weight: bold;
            display: block;
            margin: 12px 0;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.6);
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #f1f2f6;
            margin: 10px 0;
        }

        .advance {
            font-size: 22px;
            color: #2ed573;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 0 0 8px rgba(46, 213, 115, 0.6);
        }

        /* সাউন্ড বাটন */
        .sound-btn {
            background: #d4af37;
            color: #1a052e;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }
        .sound-btn:hover {
            transform: scale(1.05);
            background: #fff;
        }

        /* ১০০% ওয়ার্কিং গরুর ছবি (SVG) এবং অ্যানিমেশন */
        .cow-container {
            margin-top: 15px;
        }
        .cow-svg {
            width: 90px;
            height: 90px;
            animation: bounce 1.8s infinite ease-in-out;
        }

        /* বাজি ও লাভ রিয়্যাক্ট অ্যানিমেশন */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: explode 0.8s ease-out forwards;
        }

        .heart {
            position: absolute;
            color: #ff4757;
            font-size: 24px;
            pointer-events: none;
            animation: fall 3s linear infinite;
            z-index: 1;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-18px) scale(1.05); }
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body onclick="playCelebration()">

    <!-- ব্যাকগ্রাউন্ড ফায়ারওয়ার্ক সাউন্ড (বিকল্প ও শক্তিশালী সোর্স) -->
    <audio id="firework-sound" loop preload="auto">
        <source src="https://www.soundjay.com/mechanical/firework-explode-1.mp3" type="audio/mp3">
    </audio>

    <div class="card">
        <h1>অগ্রিম ঈদ মোবারক!</h1>
        <p>প্রিয় বন্ধু,</p>
        <span class="name">আনাবিয়া ইসলাম</span>
        <p>আসন্ন পবিত্র ঈদুল আজহার অনেক অনেক শুভেচ্ছা ও ভালোবাসা রইল। ত্যাগের মহিমায় উদ্ভাসিত হোক আপনার প্রতিটি মুহূর্ত।</p>
        
        <!-- ইনলাইন SVG কিউট কাউ (ছবি না লোড হওয়ার ঝামেলা নেই) -->
        <div class="cow-container">
            <svg class="cow-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="36" r="22" fill="#E2E8F0"/>
                <path d="M18 24c-3 0-6 2-6 6s3 5 6 3V24zM46 24c3 0 6 2 6 6s-3 5-6 3V24z" fill="#CBD5E1"/>
                <ellipse cx="23" cy="22" rx="7" ry="12" fill="#475569" transform="rotate(-30 23 22)"/>
                <ellipse cx="41" cy="22" rx="7" ry="12" fill="#475569" transform="rotate(30 41 22)"/>
                <circle cx="24" cy="34" r="3" fill="#0f172a"/>
                <circle cx="40" cy="34" r="3" fill="#0f172a"/>
                <ellipse cx="32" cy="46" rx="14" ry="9" fill="#FDA4AF"/>
                <circle cx="27" cy="45" r="1.5" fill="#E11D48"/>
                <circle cx="37" cy="45" r="1.5" fill="#E11D48"/>
                <path d="M16 42c0-5 3-7 5-5s0 8-5 5z" fill="#475569"/>
                <path d="M38 22c0-3 2-5 4-2s-1 6-4 2z" fill="#475569"/>
            </svg>
        </div>

        <div class="advance">✨আঃআলিম আপনাকে জানাচ্ছে আগ্রিম ঈদের শুভেচ্ছা ♥ঈদ মোবারক♥! ✨</div>
        <button class="sound-btn">🔊 ক্লিক করে সাউন্ড অন করুন</button>
    </div>

    <script>
        let audioPlayed = false;

        // সাউন্ড প্লে এবং বাজি ফোটানোর মেইন ফাংশн
        function playCelebration() {
            const audio = document.getElementById("firework-sound");
            
            if (!audioPlayed) {
                audio.play().then(() => {
                    audioPlayed = true;
                }).catch(err => {
                    console.log("ব্রাউজার ব্লক করেছে, আবার ক্লিক করুন।");
                });
            }
            
            // স্ক্রিনের যেখানেই ক্লিক করবেন সেখানে এক্সট্রা বাজি ফুটবে
            if(window.event) {
                for (let i = 0; i < 15; i++) {
                    createFireworkParticle(window.event.clientX, window.event.clientY);
                }
            }
        }

        // অটোমেটিক লাভ রিঅ্যাক্ট (হার্ট)
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3s + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            document.body.appendChild(heart);

            setTimeout(() => { heart.remove(); }, 3000);
        }
        setInterval(createHeart, 400);

        // অটোমেটিক বাজি ফোটার ইফেক্ট
        function autoFirework() {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * (window.innerHeight * 0.6);
            for (let i = 0; i < 20; i++) {
                createFireworkParticle(x, y);
            }
        }
        setInterval(autoFirework, 1200);

        function createFireworkParticle(x, y) {
            const p = document.createElement('div');
            p.classList.add('particle');
            
            const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa500', '#d4af37', '#ff6b81'];
            p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.style.width = Math.random() * 6 + 4 + 'px';
            p.style.height = p.style.width;

            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 120 + 60;
            p.style.setProperty('--x', Math.cos(angle) * velocity + 'px');
            p.style.setProperty('--y', Math.sin(angle) * velocity + 'px');

            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }
    </script>
</body>
</html>
